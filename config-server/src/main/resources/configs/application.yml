
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    hostname: ${RAILWAY_PUBLIC_DOMAIN:localhost}
    preferIpAddress: ${EUREKA_PREFER_IP:true}
    nonSecurePort: ${PORT:8080}
    lease-expiration-duration-in-seconds: 15
    lease-renewal-interval-in-seconds: 5

mensaje:
  global: "Configuracion entregada por el Config Server - Ferreteria Molina"
